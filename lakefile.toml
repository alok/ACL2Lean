name = "ACL2Lean"
version = "0.1.0"
defaultTargets = ["acl2lean"]

[[require]]
name = "LeanPrism"
git = "https://codeberg.org/wvhulle/lean-prism.git"
rev = "main"

[[require]]
name = "proofwidgets"
git = "https://github.com/leanprover-community/ProofWidgets4"
rev = "main"

[[lean_lib]]
name = "ACL2Lean"

[[lean_exe]]
name = "acl2lean"
root = "Main"

[[lean_exe]]
name = "test_dsl"
root = "test_dsl"
